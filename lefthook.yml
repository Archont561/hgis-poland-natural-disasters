# Lefthook configuration for git hooks
# https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  jobs:
    - name: ruff lint
      glob: "*.py"
      run: task -e dev lint --fix && git add {staged_files}

    - name: ruff format
      glob: "*.py"
      run: task -e dev format && git add {staged_files}

pre-push:
  jobs:
    - name: unit tests
      run: pixi task -e dev test -m unit
